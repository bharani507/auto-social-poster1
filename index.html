<!DOCTYPE html>
<html>

<head>
  <title>Auto Poster</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h2>Auto Social Poster</h2>

  <button onclick="login()">Login with Facebook</button>

  <hr>

  <h3>Facebook - Text</h3>
  <input id="fbText" placeholder="Write text..." />
  <button onclick="postFBText()">Post Text</button>

  <h3>Facebook - Image</h3>
  <input type="file" id="fbImage" />
  <input id="fbImageCaption" placeholder="Caption" />
  <button onclick="postFBImage()">Post Image</button>

  <h3>Facebook - Video</h3>
  <input type="file" id="fbVideo" />
  <input id="fbVideoCaption" placeholder="Caption" />
  <button onclick="postFBVideo()">Post Video</button>

  <hr>

  <h3>Instagram - Image</h3>
  <input type="file" id="igImage" />
  <input id="igCaption" placeholder="Caption" />
  <button onclick="postIGImage()">Post Image</button>

  <h3>Instagram - Video</h3>
  <input type="file" id="igVideo" />
  <input id="igVideoCaption" placeholder="Caption" />
  <button onclick="postIGVideo()">Post Video</button>

  <script>
    // Store token + page_id after login
    const params = new URLSearchParams(window.location.search);

    const token = params.get("access_token");
    const page_id = params.get("page_id");

    if (token) {
      localStorage.setItem("access_token", token);
    }

    if (page_id) {
      localStorage.setItem("page_id", page_id);
    }

    if (token) {
      alert("Login successful!");
      window.history.replaceState({}, document.title, "/");
    }

    // Login function
    function login() {
      window.location.href = "/api/auth/login";
    }

    // Facebook text post
    async function postFBText() {
      const token = localStorage.getItem("access_token");
      const page_id = localStorage.getItem("page_id");
      const message = document.getElementById("fbText").value;

      const res = await fetch("/api/post", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          access_token: token,
          message,
          page_id
        })
      });

      alert(JSON.stringify(await res.json()));
    }



    async function postFBImage() {
      const file = document.getElementById("fbImage").files[0];
      const caption = document.getElementById("fbImageCaption").value;

      const token = localStorage.getItem("access_token");
      const page_id = localStorage.getItem("page_id");

      if (!file) return alert("Select image");

      const formData = new FormData();
      formData.append("file", file);

      // 🔥 Upload via your backend
      const uploadRes = await fetch("/api/upload", {
        method: "POST",
        body: formData
      });

      const uploadData = await uploadRes.json();

      const image_url = uploadData.secure_url;

      const res = await fetch("/api/post", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          access_token: token,
          page_id,
          message: caption,
          image_url
        })
      });

      alert(JSON.stringify(await res.json()));
    }

    async function postFBVideo() {
      const file = document.getElementById("fbVideo").files[0];
      const caption = document.getElementById("fbVideoCaption").value;

      const formData = new FormData();
      formData.append("file", file);

      // upload video
      const uploadRes = await fetch("/api/upload", {
        method: "POST",
        body: formData,
      });

      const uploadData = await uploadRes.json();

      console.log("VIDEO URL:", uploadData.secure_url); // 🔥 IMPORTANT

      // send to backend
      const res = await fetch("/api/post", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          access_token: localStorage.getItem("access_token"),
          page_id: localStorage.getItem("page_id"),
          message: caption,
          video_url: uploadData.secure_url,
        }),
      });

      const data = await res.json();
      alert(JSON.stringify(data));
    }
    async function postIGImage() {
      const file = document.getElementById("igImage").files[0];
      const caption = document.getElementById("igCaption").value;

      const formData = new FormData();
      formData.append("file", file);

      // Upload first
      const uploadRes = await fetch("/api/upload", {
        method: "POST",
        body: formData,
      });

      const uploadData = await uploadRes.json();

      // Then post
      const res = await fetch("/api/post", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          access_token: localStorage.getItem("access_token"),
          page_id: localStorage.getItem("page_id"),
          message: caption,
          image_url: uploadData.secure_url,
        }),
      });

      const data = await res.json();
      alert(JSON.stringify(data));
    }
    async function postIGVideo() {
      const file = document.getElementById("igVideo").files[0];
      const caption = document.getElementById("igVideoCaption").value;

      const formData = new FormData();
      formData.append("file", file);

      const uploadRes = await fetch("/api/upload", {
        method: "POST",
        body: formData,
      });

      const uploadData = await uploadRes.json();

      const res = await fetch("/api/post", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          access_token: localStorage.getItem("access_token"),
          page_id: localStorage.getItem("page_id"),
          message: caption,
          video_url: uploadData.secure_url,
        }),
      });

      const data = await res.json();
      alert(JSON.stringify(data));
    }

  </script>

</body>

</html>
